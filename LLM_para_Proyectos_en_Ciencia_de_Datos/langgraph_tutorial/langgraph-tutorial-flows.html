.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);

  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {

}

        &#x27;workflow-lookup&#x27;: [&#x27;lookup_ticket — nodo determinista&#x27;, &#x27;Busca el ID en un diccionario local. Para el mismo ID, siempre produce el mismo resultado: encontrado o no encontrado.&#x27;, &#x27;lookup_ticket(state) → {found, ticket_detail}&#x27;],

        &#x27;agent-user&#x27;: [&#x27;Usuario — inicia el ciclo&#x27;, &#x27;El mensaje se agrega al estado de mensajes que el agente entrega al modelo.&#x27;, &#x27;messages = [(user, ...)]&#x27;],
        &#x27;agent-llm&#x27;: [&#x27;create_agent — orquestación rápida&#x27;, &#x27;LangChain llama al LLM y, si el modelo produce una llamada de herramienta, continúa el ciclo. Si no hay llamada, finaliza.&#x27;, &#x27;create_agent(model, tools, system_prompt)&#x27;],
        &#x27;agent-tools&#x27;: [&#x27;Herramienta — evidencia externa&#x27;, &#x27;Una función Python con tipos y docstring. El modelo propone argumentos; el runtime ejecuta la función y devuelve el resultado al LLM.&#x27;, &#x27;@tool def get_store_hours(store: str)&#x27;],

  let tooltip = null;

  let autoUpdateCleanup = null;
