defaults:
  extraction_model: gemini-3.1-flash-lite
  verification_model: gemini-2.5-pro
  local_model: local-model

models:
  gemini-3.1-flash-lite:
    backend: gemini
    display_name: Gemini 3.1 Flash-Lite
    multimodal: true
    recommended_use: "Fast multimodal receipt extraction"
    temperature: 0
    max_output_tokens: 1200
  gemini-2.5-pro:
    backend: gemini
    display_name: Gemini 2.5 Pro
    multimodal: true
    recommended_use: "Higher-quality validation and comparison"
    temperature: 0
    max_output_tokens: 1600
  local-model:
    backend: lmstudio
    display_name: LM Studio local model
    multimodal: true
    recommended_use: "Local comparison with Gemma, Phi, or another loaded model"
    temperature: 0
    max_output_tokens: 1200
